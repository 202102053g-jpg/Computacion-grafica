<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computación Gráfica - Panel de Recursos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle, #1a1c29, #0e1017);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .dashboard {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #8a99ad;
            margin-bottom: 40px;
            font-size: 1.05rem;
        }

        /* Contenedor de Tarjetas */
        .grid-botones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .card-btn {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 35px 20px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .card-btn i {
            font-size: 3.8rem;
            transition: transform 0.3s ease;
        }

        .card-btn span {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* --- Dinamismo Dinámico y Colores por Botón --- */
        
        /* PDF (Rojo Monografía) */
        .card-pdf:hover {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.35);
        }
        .card-pdf i { color: #ff4b2b; }
        .card-pdf:hover i { color: white; transform: rotate(-8deg); }

        /* PPT (Morado/Celeste Canva) */
        .card-ppt:hover {
            background: linear-gradient(135deg, #7f00ff, #e100ff);
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 30px rgba(127, 0, 255, 0.35);
        }
        .card-ppt i { color: #a29bfe; }
        .card-ppt:hover i { color: white; transform: scale(1.15); }

        /* Aplicativo (Azul Tecnológico) */
        .card-app:hover {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 114, 255, 0.35);
        }
        .card-app i { color: #00c6ff; }
        .card-app:hover i { color: white; transform: translateY(-4px); }

        /* Pizarra Didáctica Inteligente */
        .pizarra-informativa {
            background: rgba(0, 0, 0, 0.4);
            border-left: 5px solid #4facfe;
            padding: 22px;
            border-radius: 12px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .pizarra-informativa p {
            font-size: 1.05rem;
            color: #cdcdcd;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="dashboard animate__animated animate__fadeInUp">
        <h1>PROYECTO: COMPUTACIÓN GRÁFICA</h1>
        <p class="subtitle">Explora la documentación, la presentación interactiva y el código ejecutable</p>

        <div class="grid-botones">
            
            <a href="computacon gráfica/investigacion/Monografia Modelado 3D y herramientas digitalesdocx (1).pdf" target="_blank" class="card-btn card-pdf" 
               onmouseenter="mostrarGuia('pdf')" onmouseleave="ocultarGuia()">
                <i class="fa-solid fa-file-pdf"></i>
                <span>VER MONOGRAFÍA</span>
            </a>

            <a href="https://www.canva.com/design/DAHJs2DE8c8/TX-g_gZtfz11E0nOlkn0Nw/view" target="_blank" class="card-btn card-ppt" 
               onmouseenter="mostrarGuia('ppt')" onmouseleave="ocultarGuia()">
                <i class="fa-solid fa-file-powerpoint"></i>
                <span>PRESENTACIÓN PPT</span>
            </a>

            <a href="../Paginaprincipal.html" class="card-btn card-app" 
               onmouseenter="mostrarGuia('app')" onmouseleave="ocultarGuia()">
                <i class="fa-solid fa-laptop-code"></i>
                <span>ABRIR APLICATIVO</span>
            </a>

        </div>

        <div class="pizarra-informativa">
            <p id="pizarra-texto">💡 Pasa el cursor sobre cualquiera de las tarjetas para obtener una descripción didáctica de su contenido.</p>
        </div>
    </div>

    <script>
        const pizarra = document.getElementById('pizarra-texto');
        const contenedorPizarra = document.querySelector('.pizarra-informativa');

        function mostrarGuia(tipo) {
            if (tipo === 'pdf') {
                pizarra.innerHTML = "📄 <strong>Monografía PDF:</strong> Explora el marco teórico del proyecto. Aquí se detalla la investigación sobre el Modelado 3D y las herramientas digitales empleadas.";
                contenedorPizarra.style.borderLeftColor = "#ff4b2b";
            } else if (tipo === 'ppt') {
                pizarra.innerHTML = "📊 <strong>Presentación Digital:</strong> Abre directamente tus diapositivas dinámicas de Canva para visualizar de forma rápida e ilustrativa el resumen del proyecto.";
                contenedorPizarra.style.borderLeftColor = "#e100ff";
            } else if (tipo === 'app') {
                pizarra.innerHTML = "🚀 <strong>Entorno Aplicativo:</strong> Ejecuta la interfaz gráfica interactiva. Te redirigirá a 'Paginaprincipal.html' para interactuar directamente con los elementos y figuras programadas.";
                contenedorPizarra.style.borderLeftColor = "#00c6ff";
            }
        }

        function ocultarGuia() {
            pizarra.innerHTML = "💡 Pasa el cursor sobre cualquiera de las tarjetas para obtener una descripción didáctica de su contenido.";
            contenedorPizarra.style.borderLeftColor = "#4facfe";
        }
    </script>

</body>
</html>
